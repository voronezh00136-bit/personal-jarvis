name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    name: Python Syntax Check

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax — Phase 1
        run: python -m py_compile phase1/jarvis.py && echo "phase1/jarvis.py OK"

      - name: Check syntax — Phase 2
        run: |
          for f in phase2/*.py; do
            python -m py_compile "$f" && echo "$f OK"
          done

      - name: Check syntax — Phase 3
        run: |
          for f in phase3/*.py; do
            python -m py_compile "$f" && echo "$f OK"
          done

  lint:
    runs-on: ubuntu-latest
    name: Lint (flake8 — errors only)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 (E9 errors only — syntax/imports)
        run: flake8 phase1/ phase2/ phase3/ --select=E9,F63,F7,F82 --show-source
